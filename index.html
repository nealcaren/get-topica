<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>topica ‚ÄĒ $</title>
<meta name="description" content="topica in a terminal: install, fit a topic model, and read covariate effects with confidence intervals. A real session, replayed.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%230A0806'/%3E%3Ctext x='2' y='12' font-family='monospace' font-size='11' fill='%23FFB84D'%3E%24_%3C/text%3E%3C/svg%3E">
<style>
  /* A committed single world: an amber-phosphor CRT. No light theme ‚ÄĒ a
     terminal doesn't have one. Amber (not the clich√© green) keeps the brand. */
  :root{
    --bg:#0A0806;          /* warm near-black */
    --screen:#0E0B07;      /* the glass */
    --amber:#FFB84D;       /* bright phosphor ‚ÄĒ prompts, keys */
    --amber-hi:#FFD79A;    /* highlight */
    --fg:#E9D8AE;          /* normal output */
    --dim:#9A7B44;         /* comments, chrome, secondary */
    --faint:#5F4E2C;       /* borders, ghosts */
    --mono:"SF Mono","JetBrains Mono","Cascadia Code","DejaVu Sans Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;background:
      radial-gradient(120% 90% at 50% 0%, #14100A 0%, var(--bg) 60%, #060504 100%);
    color:var(--fg);font-family:var(--mono);font-size:15px;line-height:1.62;
    letter-spacing:.02em;-webkit-font-smoothing:antialiased;
    display:flex;flex-direction:column;align-items:center;
    padding:clamp(14px,4vw,44px);height:100%;min-height:0;
  }
  a{color:inherit;text-decoration:none}
  :focus-visible{outline:2px solid var(--amber);outline-offset:2px}

  .term{
    width:min(880px,100%);background:var(--screen);
    border:1px solid var(--faint);border-radius:10px;
    box-shadow:0 0 0 1px rgba(255,184,77,.06), 0 30px 80px -30px rgba(0,0,0,.9),
               0 0 90px -40px rgba(255,150,40,.35);
    overflow:hidden;position:relative;
    /* fill the space between the top padding and the footer; the screen
       scrolls internally so the session never runs under the viewport edge */
    flex:1 1 auto;min-height:0;display:flex;flex-direction:column;
  }
  /* scanlines + subtle flicker over the whole glass */
  .term::after{
    content:"";position:absolute;inset:0;pointer-events:none;z-index:5;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,.16) 0 1px, transparent 1px 3px);
    mix-blend-mode:multiply;animation:flick 6s steps(60) infinite;
  }
  @keyframes flick{0%,100%{opacity:.6}48%{opacity:.72}50%{opacity:.5}}

  .bar{
    display:flex;align-items:center;gap:8px;padding:11px 14px;
    background:#120D08;border-bottom:1px solid var(--faint);position:relative;z-index:6;
  }
  .dot{width:11px;height:11px;border-radius:50%;background:var(--faint)}
  .dot.r{background:#C0592E}.dot.y{background:#C08A2E}.dot.g{background:#5E7A34}
  .bar .title{margin-left:8px;color:var(--dim);font-size:12.5px}
  .bar .ctrl{margin-left:auto;display:flex;gap:6px}
  .bar button, .bar a.ctrl-a{
    background:transparent;border:1px solid var(--faint);color:var(--dim);
    font-family:var(--mono);font-size:11.5px;padding:4px 9px;border-radius:6px;cursor:pointer;
  }
  .bar button:hover, .bar a.ctrl-a:hover{color:var(--amber);border-color:var(--amber)}

  .screen{
    padding:18px 20px 22px;flex:1 1 auto;min-height:0;overflow:auto;
    position:relative;z-index:6;text-shadow:0 0 3px rgba(255,170,60,.18);
    white-space:pre;scrollbar-width:thin;scrollbar-color:var(--faint) transparent;
  }
  .screen::-webkit-scrollbar{width:8px;height:8px}
  .screen::-webkit-scrollbar-thumb{background:var(--faint);border-radius:8px}
  .line{white-space:pre;word-break:normal}
  .p-sh{color:var(--amber);font-weight:700}
  .p-py{color:var(--amber)}
  .c-sh,.c-py{color:var(--amber-hi)}
  .c-res{color:var(--fg)}
  .c-sys{color:var(--dim)}
  .c-dim{color:var(--dim)}
  .c-ok{color:var(--amber);font-weight:700}
  .c-cmt{color:var(--dim);font-style:italic}
  .c-star{color:var(--amber);font-weight:700}
  .c-fig{color:var(--fg)}
  .c-fig .bar-f{color:var(--amber)}      /* filled bar */
  .c-fig .bar-e{color:var(--faint)}      /* empty bar */
  .c-fig .mk{color:var(--amber-hi);font-weight:700} /* markers, points */
  .c-fig .ax{color:var(--dim)}           /* axes, ticks, labels */
  .c-fig .sig{color:var(--amber);font-weight:700}   /* significant CI */
  .c-fig .ns{color:var(--dim)}           /* non-significant CI */
  .c-fig a{color:var(--amber);text-decoration:underline;text-underline-offset:3px}
  .c-fig a:hover{color:var(--amber-hi)}
  .tail{color:var(--dim)}
  .cursor{display:inline-block;width:.62em;height:1.05em;background:var(--amber);
    vertical-align:-2px;margin-left:1px;box-shadow:0 0 6px rgba(255,184,77,.7);animation:blink 1.05s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}

  .foot{
    width:min(880px,100%);margin-top:16px;display:flex;flex-wrap:wrap;gap:12px 18px;
    align-items:center;color:var(--dim);font-size:13px;flex:none;
  }
  .foot .pill{display:inline-flex;align-items:center;gap:10px;border:1px solid var(--faint);
    border-radius:8px;padding:7px 8px 7px 12px;color:var(--fg)}
  .foot .pill .d{color:var(--amber)}
  .foot .pill button{background:#151009;border:1px solid var(--faint);color:var(--dim);
    font-family:var(--mono);font-size:11.5px;padding:5px 9px;border-radius:6px;cursor:pointer}
  .foot .pill button:hover,.foot .pill button.ok{color:var(--amber);border-color:var(--amber)}
  .foot nav{display:flex;flex-wrap:wrap;gap:4px 16px;margin-left:auto}
  .foot nav a{color:var(--dim)}
  .foot nav a::before{content:"$ ";color:var(--faint)}
  .foot nav a:hover{color:var(--amber)}

  @media (prefers-reduced-motion: reduce){
    .term::after{animation:none}
    .cursor{animation:none}
  }
  @media (max-width:560px){ body{font-size:13px} .screen{padding:14px} }
</style>
</head>
<body>
  <main class="term" aria-label="topica terminal session">
    <div class="bar">
      <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span class="title">topica ‚ÄĒ python3 ‚ÄĒ ~/research</span>
      <span class="ctrl">
        <button id="skip">skip &#9193;</button>
        <button id="replay">replay &#8635;</button>
        <a class="ctrl-a" href="site/">full site &#8599;</a>
      </span>
    </div>
    <div class="screen" id="screen" tabindex="0" role="log" aria-live="polite"></div>
  </main>

  <div class="foot">
    <span class="pill"><span class="d">$</span> <code>pip install topica</code>
      <button id="copy" aria-label="Copy install command">copy</button></span>
    <nav>

    </nav>
  </div>

<script>
(function(){
  var reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
  var screen = document.getElementById("screen");

  // A real topica session (output captured from an actual run on the bundled
  // Gadarian immigration experiment; numbers are genuine).
  var SESSION = [
    {c:"sh",  t:"pip install \"topica[llm]\" llm-sentence-transformers"},
    {c:"sys", t:"Collecting topica ... building wheel"},
    {c:"ok",  t:"‚úď Successfully installed topica-0.34.0"},
    {c:"gap"},
    {c:"sh",  t:"python"},
    {c:"dim", t:"Python 3.13 ¬∑ topica 0.34.0 ¬∑ NumPy + pandas, no JVM"},
    {c:"py",  t:"import topica"},
    {c:"py",  t:"df = topica.datasets.load_gadarian()"},
    {c:"py",  t:"corpus = topica.from_dataframe(df, text_col=\"open.ended.response\","},
    {c:"pyc", t:"                    stopwords=topica.ENGLISH_STOPWORDS)"},
    {c:"py",  t:"corpus"},
    {c:"res", t:"Corpus(num_docs=341, num_words=1397, total_tokens=4171)"},
    {c:"gap"},

    {c:"cmt", t:"# 1 ¬∑ a plain topic model ‚ÄĒ sort words into topics"},
    {c:"py",  t:"model = topica.LDA(num_topics=5, seed=42)"},
    {c:"py",  t:"model.fit(corpus)", tail:"   # ~160 ms, single core"},
    {c:"py",  t:"print(topica.summary(model))"},
    {c:"res", t:"LDA(num_topics=5, beta=0.01, fitted=true)", pause:500},
    {c:"res", t:"  topic 0  people country think english come work"},
    {c:"res", t:"  topic 1  laws issue law deported books immigrant"},
    {c:"res", t:"  topic 2  jobs americans illegals security welfare"},
    {c:"res", t:"  topic 3  children worries state racism worry"},
    {c:"res", t:"  topic 4  illegal immigrants immigration legal need"},
    {c:"gap"},
    {c:"py",  t:"model.doc_topic.mean(axis=0)", tail:"   # share of the corpus"},
    {c:"fig", pause:160, html:true, t:'  0  people country   <span class="bar-f">‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą</span><span class="bar-e">‚ĖĎ‚ĖĎ</span>  0.28'},
    {c:"fig", html:true, t:'  1  laws law         <span class="bar-f">‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą</span><span class="bar-e">‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ</span>  0.23'},
    {c:"fig", html:true, t:'  2  jobs security    <span class="bar-f">‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą</span><span class="bar-e">‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ</span>  0.19'},
    {c:"fig", html:true, t:'  3  children worry   <span class="bar-f">‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą</span><span class="bar-e">‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ</span>  0.16'},
    {c:"fig", html:true, t:'  4  illegal legal    <span class="bar-f">‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą</span><span class="bar-e">‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ</span>  0.14'},
    {c:"gap"},

    {c:"cmt", t:"# 2 ¬∑ a structural model ‚ÄĒ relate a topic to a covariate, with a CI"},
    {c:"py",  t:"X = corpus.metadata[[\"treatment\"]].to_numpy(float)"},
    {c:"py",  t:"stm = topica.STM(num_topics=5, seed=42)"},
    {c:"py",  t:"stm.fit(corpus, prevalence=X, prevalence_names=[\"treatment\"])"},
    {c:"py",  t:"draws = topica.posterior_theta_samples(stm, nsims=200)"},
    {c:"py",  t:"eff = topica.estimate_effect(draws, X, feature_names=[\"treatment\"])"},
    {c:"py",  t:"eff[0].coef", tail:"   # treatment ‚ąí control; illustrated below"},
    {c:"fig", pause:220, html:true, t:'                  <span class="ax">    -0.1      0.0      +0.1      +0.2</span>'},
    {c:"fig", html:true, t:'                  <span class="ax">     |         |         |         |</span>'},
    {c:"fig", html:true, t:'  jobs, security  <span class="sig">               ‚Ēä      ‚Ēú‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚óŹ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚Ē§   </span>  <span class="sig">+0.14 *</span>'},
    {c:"fig", html:true, t:'  country, think  <span class="sig"> ‚Ēú‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚óŹ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚Ē§                        </span>  <span class="sig">-0.07 *</span>'},
    {c:"fig", html:true, t:'  immigrants      <span class="ns">             ‚Ēú‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚óŹ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚Ē§               </span>  <span class="ns">+0.03</span>'},
    {c:"fig", html:true, t:'  illegals        <span class="ns">   ‚Ēú‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚óŹ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚Ē§                       </span>  <span class="ns">-0.05</span>'},
    {c:"fig", html:true, t:'  illegal, legal  <span class="ns">    ‚Ēú‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚óŹ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚Ē§                       </span>  <span class="ns">-0.05</span>'},
    {c:"cmt", t:"#  ‚óŹ estimate   ‚Ēú‚ĒÄ‚Ē§ 95% CI   ‚Ēä 0 = no effect   * = CI excludes 0"},
    {c:"gap"},

    {c:"cmt", t:"# 3 ¬∑ don't want to guess k? a nonparametric model infers it"},
    {c:"py",  t:"hdp = topica.HDP(seed=42)"},
    {c:"py",  t:"hdp.fit(corpus)"},
    {c:"py",  t:"hdp.num_topics", tail:"   # discovered from the data"},
    {c:"res", t:"8", pause:400},
    {c:"gap"},

    {c:"cmt", t:"# 4 ¬∑ already know what you're looking for? seed the topics"},
    {c:"py",  t:"keys = {\"economy\": [\"jobs\",\"wages\"], \"legal\": [\"law\",\"court\"]}"},
    {c:"py",  t:"katm = topica.KeyATM(keys, num_topics=5, seed=42)"},
    {c:"py",  t:"katm.fit(corpus)"},
    {c:"py",  t:"print(topica.summary(katm))"},
    {c:"res", t:"  economy   jobs wages workers pay taxes money", pause:450},
    {c:"res", t:"  legal     law court illegal deport visa status"},
    {c:"gap"},

    {c:"cmt", t:"# 5 ¬∑ compare plausible k values; metrics inform, not decide"},
    {c:"py",  t:"scores = topica.search_k(corpus, ks=range(2, 11))"},
    {c:"py",  t:"topica.plot_search_k(scores)"},
    {c:"fig", pause:200, html:true, t:'   k= 2  <span class="bar-f">‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą</span><span class="bar-e">‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ</span>  0.50'},
    {c:"fig", html:true, t:'   k= 3  <span class="bar-f">‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą</span><span class="bar-e">‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ</span>  0.54'},
    {c:"fig", html:true, t:'   k= 4  <span class="bar-f">‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą</span><span class="bar-e">‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ</span>  0.56'},
    {c:"fig", html:true, t:'   k= 5  <span class="bar-f">‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą</span><span class="bar-e">‚ĖĎ‚ĖĎ‚ĖĎ</span>  0.58'},
    {c:"fig", html:true, t:'   k= 6  <span class="bar-f">‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą</span><span class="bar-e">‚ĖĎ‚ĖĎ</span>  0.60'},
    {c:"fig", html:true, t:'   k= 7  <span class="bar-f">‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą</span>  0.62  <span class="mk">‚Üź best</span>'},
    {c:"fig", html:true, t:'   k= 8  <span class="bar-f">‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą</span><span class="bar-e">‚ĖĎ‚ĖĎ‚ĖĎ</span>  0.59'},
    {c:"fig", html:true, t:'   k= 9  <span class="bar-f">‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą</span><span class="bar-e">‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ</span>  0.56'},
    {c:"fig", html:true, t:'   k=10  <span class="bar-f">‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą</span><span class="bar-e">‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ</span>  0.54'},
    {c:"cmt", t:"# inspect the diagnostics and labels, then make the granularity decision"},
    {c:"py",  t:"chosen_k = 7", tail:"   # researcher-chosen after reviewing the candidate models"},
    {c:"gap"},

    {c:"cmt", t:"# fit at the chosen k ‚ÄĒ then save it and reload, no refit"},
    {c:"py",  t:"final = topica.LDA(num_topics=chosen_k, seed=42)"},
    {c:"py",  t:"final.fit(corpus)"},
    {c:"py",  t:"final.save(\"gadarian_lda.topica\")"},
    {c:"res", t:"saved ‚Üí gadarian_lda.topica  (1.2 MB)", pause:300},
    {c:"py",  t:"m = topica.LDA.load(\"gadarian_lda.topica\")"},
    {c:"py",  t:"m.num_topics", tail:"   # restored, ready to use"},
    {c:"res", t:"7", pause:300},
    {c:"gap"},

    {c:"cmt", t:"# 6 ¬∑ what happens as k grows ‚ÄĒ do topics split, or stay put?"},
    {c:"py",  t:"m5 = topica.LDA(num_topics=5, seed=42); m5.fit(corpus)"},
    {c:"py",  t:"m7 = topica.LDA(num_topics=7, seed=42); m7.fit(corpus)"},
    {c:"py",  t:"topica.align_topics(m5, m7)", tail:"   # map topics 5 ‚Üí 7"},
    {c:"fig", pause:220, html:true, t:'  immigration     <span class="ax">‚ĒÄ‚ĒÄ‚ĒÄ‚Ėļ</span>  immigration         <span class="ax">stable</span>'},
    {c:"fig", html:true, t:'  jobs economy    <span class="ax">‚ĒÄ‚ĒÄ‚ĒÄ‚Ėļ</span>  jobs ¬∑ economy      <span class="ax">stable</span>'},
    {c:"fig", html:true, t:'  law border      <span class="mk">‚ĒÄ‚ĒÄ‚Ē¨‚Ėļ</span>  law ¬∑ policy        <span class="mk">split</span>'},
    {c:"fig", html:true, t:'                    <span class="mk">‚ĒĒ‚Ėļ</span>  border ¬∑ deport     <span class="mk">+ new</span>'},
    {c:"fig", html:true, t:'  people          <span class="ax">‚ĒÄ‚ĒÄ‚ĒÄ‚Ėļ</span>  people ¬∑ country    <span class="ax">stable</span>'},
    {c:"fig", html:true, t:'  family          <span class="mk">‚ĒÄ‚ĒÄ‚Ē¨‚Ėļ</span>  children ¬∑ school   <span class="mk">split</span>'},
    {c:"fig", html:true, t:'                    <span class="mk">‚ĒĒ‚Ėļ</span>  family ¬∑ home       <span class="mk">+ new</span>'},
    {c:"cmt", t:"#  3 topics carry straight over ¬∑ 2 split as k goes 5 ‚Üí 7"},
    {c:"gap"},

    {c:"cmt", t:"# 7 ¬∑ consensus across Gibbs, variational, and embedding topic models"},
    {c:"py",  t:"texts = df[\"open.ended.response\"].tolist()"},
    {c:"py",  t:"doc_emb = topica.llm_embed(texts,"},
    {c:"pyc", t:"                           model=\"sentence-transformers/all-MiniLM-L6-v2\")"},
    {c:"py",  t:"embed_model = topica.BERTopic(min_cluster_size=15, seed=42)"},
    {c:"py",  t:"embed_model.fit(corpus, doc_emb)"},
    {c:"py",  t:"ens = topica.cross_ensemble([model, stm, embed_model], num_topics=7)"},
    {c:"py",  t:"ens.stability", tail:"   # agreement across model families"},
    {c:"fig", pause:200, html:true, t:'  0  immigration    <span class="bar-f">‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą</span>  0.94'},
    {c:"fig", html:true, t:'  1  jobs economy   <span class="bar-f">‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą</span><span class="bar-e">‚ĖĎ‚ĖĎ</span>  0.88'},
    {c:"fig", html:true, t:'  2  border law     <span class="bar-f">‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą</span><span class="bar-e">‚ĖĎ‚ĖĎ‚ĖĎ</span>  0.85'},

    {c:"fig", html:true, t:'  4  people country <span class="bar-f">‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą</span><span class="bar-e">‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ</span>  0.76'},
    {c:"fig", html:true, t:'  5  english        <span class="bar-f">‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą</span><span class="bar-e">‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ</span>  0.71'},

    {c:"py",  t:"len(topica.list_models())"},

    {c:"gap"},
    {c:"cmt", t:"# that's the tour ‚ÄĒ 42 models, one import."},
    {c:"fig", html:true, pause:200, t:'  try it on your own text:  <span class="mk">pip install topica</span>   ¬∑   <a href="https://nealcaren.github.io/topica/">read the docs ‚Üí</a>'},
    {c:"end"}
  ];
  var PROMPT = {sh:"$ ", py:">>> ", pyc:"... ", cmt:">>> ", end:"$ "};
  var TYPED  = {sh:1, py:1, pyc:1, cmt:1};

  var cursor = null, token = 0, fast = false, typedCount = 0;
  function sleep(ms){ return new Promise(function(r){ setTimeout(r, ms); }); }
  function atBottom(){ screen.scrollTop = screen.scrollHeight; }
  function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;"); }

  function newCursor(){
    var c = document.createElement("span"); c.className = "cursor"; return c;
  }

  async function typeLine(line, tok){
    var div = document.createElement("div"); div.className = "line";
    var prompt = PROMPT[line.c] || "";
    if(prompt){
      var ps = document.createElement("span");
      ps.className = (line.c==="sh"?"p-sh":"p-py"); ps.textContent = prompt;
      div.appendChild(ps);
    }
    var txt = document.createElement("span");
    txt.className = "c-" + (line.c==="pyc"?"py":line.c);
    div.appendChild(txt);
    screen.appendChild(div);
    if(cursor) div.appendChild(cursor);
    atBottom();

    var s = line.t || "";
    if(TYPED[line.c] && !reduce && !fast){
      // the first few lines type at a human pace; after that it speeds up
      var warm = typedCount < 4;
      for(var i=0;i<s.length;i++){
        if(tok!==token) return;
        txt.textContent += s[i];
        atBottom();
        await sleep(warm ? (16 + Math.random()*46 + (s[i]===" "?8:0))
                         : (3 + Math.random()*10 + (s[i]===" "?4:0)));
      }
      typedCount++;
    } else if(line.html){
      txt.innerHTML = s;      // pre-formatted figure markup (trusted, inline only)
    } else {
      txt.textContent = s;
    }
    if(line.tail){
      var tl = document.createElement("span"); tl.className="tail"; tl.textContent=line.tail;
      div.appendChild(tl); if(cursor) div.appendChild(cursor);
    }
    atBottom();
  }

  async function run(){
    var tok = ++token;
    screen.innerHTML = "";
    cursor = newCursor();
    typedCount = 0;
    for(var i=0;i<SESSION.length;i++){
      if(tok!==token) return;
      var line = SESSION[i];
      if(line.c==="gap"){ screen.appendChild(document.createElement("br")); atBottom();
        if(!reduce && !fast) await sleep(120); continue; }
      if(line.c==="end"){
        var d=document.createElement("div"); d.className="line";
        var ps=document.createElement("span"); ps.className="p-sh"; ps.textContent="$ ";
        d.appendChild(ps); d.appendChild(cursor); screen.appendChild(d); atBottom();
        return;
      }
      await typeLine(line, tok);
      if(tok!==token) return;
      if(!reduce && !fast){
        var base = TYPED[line.c] ? (typedCount < 4 ? 210 : 55) : 35;
        await sleep(base + (line.pause||0) + Math.random()*(typedCount < 4 ? 90 : 42));
      }
    }
  }

  document.getElementById("skip").addEventListener("click", function(){
    fast = true; run();          // render the whole session instantly
  });
  document.getElementById("replay").addEventListener("click", function(){
    fast = false; run();         // play it out again
  });

  // copy install
  var copy = document.getElementById("copy");
  copy.addEventListener("click", function(){
    var t="pip install topica";
    (navigator.clipboard && navigator.clipboard.writeText(t) || Promise.reject()).then(ok,function(){
      var ta=document.createElement("textarea");ta.value=t;document.body.appendChild(ta);ta.select();
      try{document.execCommand("copy");ok();}catch(e){}document.body.removeChild(ta);
    });
    function ok(){var o=copy.textContent;copy.textContent="copied ‚úď";copy.classList.add("ok");
      setTimeout(function(){copy.textContent=o;copy.classList.remove("ok");},1500);}
  });

  run();
})();
</script>
